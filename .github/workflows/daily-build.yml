name: Daily Build

on:
  # 每天 UTC 18:00 触发（北京时间次日 02:00），可按需修改
  schedule:
    - cron: '0 18 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  # 检查过去 24 小时内是否有新提交，没有则跳过构建，避免重复打包
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for recent commits
        id: check
        run: |
          # 手动触发时无条件构建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 定时触发：仅当过去 24 小时内有新提交才构建
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "过去 24 小时无新提交，跳过构建"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 发布 Release 需要写权限

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive # 拉取子模块

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # web 模块的 preBuild 会执行 `pnpm run build` 构建前端，必须准备好 Node + pnpm
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      # gradle 的 buildWebUi 任务只跑 build 不跑 install，需在此提前安装依赖
      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - name: Prepare build files
        run: |
          # 解码base64编码的keystore文件（如果secret存在）
          if [ -n "${{ secrets.KEY_BASE64 }}" ]; then
            echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          else
            echo "⚠️ KEY_BASE64 未设置，跳过签名配置"
          fi

          # 写入签名配置到local.properties（如果secret存在）
          if [ -n "${{ secrets.SIGNING_CONFIG }}" ]; then
            echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          else
            echo "⚠️ SIGNING_CONFIG 未设置，跳过签名配置"
          fi

          # 写入Google Services配置（如果secret不存在则用占位文件）
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'JSONEOF'
{"project_info":{"project_number":"0","project_id":"dummy","firebase_url":"https://dummy.firebaseio.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000000","android_client_info":{"package_name":"me.rerere.rikkahub"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}},{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000001","android_client_info":{"package_name":"me.rerere.rikkahub.debug"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}]}
JSONEOF
            echo "⚠️ GOOGLE_SERVICES_JSON 未设置，使用占位配置"
          fi

      - name: Gradle Build
        run: |
          chmod +x gradlew
          if [ -n "${{ secrets.KEY_BASE64 }}" ] && [ -n "${{ secrets.SIGNING_CONFIG }}" ]; then
            ./gradlew assembleRelease
          else
            echo "⚠️ 签名密钥未设置，使用 assembleDebug 构建"
            ./gradlew assembleDebug
          fi

      # 把 APK 直接发布为 Prerelease
      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            自动每日构建（commit `${{ github.sha }}`）

            > ⚠️ 开发版本，可能不稳定，仅供测试。
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk

